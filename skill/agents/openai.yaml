interface:
  display_name: "Domain Search"
  short_description: "Generate and check real-word or brandable domains"
  default_prompt: "Use $domain-search via its launcher directly. For open-ended domain discovery, start with search and keep the built-in mixed default unless the user explicitly asks for .com only, one specific TLD, or domain hacks only. When mixed results are used, present the final answer in two sections: traditional exact domains and domain hacks, with both represented when available. Use --mode brandable only when the user explicitly wants shorter brandable .com ideas from a supplied source list. Do not force availability with filler endings like co or company. If the user did not explicitly ask for a TLD, do not invent non-.com exact domains or coined non-.com brandables, and do not use check on agent-crafted non-.com ideas; stick to .com exact domains plus true whole-word hacks from search. Do not surface arbitrary non-.com domains as hacks: the label plus TLD must read as a whole word, for example truck.in -> truckin, while trucks.in, steady.st, or equilia.in should be rejected. Search is bounded by default, so if it stops early, explain search_truncated and remaining_candidates."

policy:
  allow_implicit_invocation: true
