interface:
  display_name: "Domain Search"
  short_description: "Generate and check real-word or brandable domains"
  default_prompt: "Use $domain-search via its launcher directly. For open-ended domain discovery, start with search and keep the built-in mixed default unless the user explicitly asks for .com only, one specific TLD, or creative suffix domains only. When mixed results are used, present the final answer in two sections: traditional exact domains and creative suffix domains, with both represented when available."

policy:
  allow_implicit_invocation: true
