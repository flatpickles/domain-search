interface:
  display_name: "Domain Search"
  short_description: "Generate and check real-word or brandable domains"
  default_prompt: "Use $domain-search via its launcher directly. For open-ended domain discovery, start with search and keep the built-in mixed default unless the user explicitly asks for .com only, one specific TLD, or domain hacks only. When verified availability is needed, choose one appropriately sized live search/check command; do not automatically run a second wider check when results are thin or search_truncated/remaining_candidates says more candidates remain. Omit --show-unknown in normal final-result searches unless the user asks for inconclusive results or diagnostics. When mixed results are used, present the final answer in two sections: traditional exact domains and domain hacks, with both represented when available. Use --mode brandable only when the user explicitly wants shorter brandable .com ideas from a supplied source list. Do not force availability with filler endings like co or company. If the user did not explicitly ask for a TLD, do not invent non-.com exact domains or coined non-.com brandables, and do not use check on agent-crafted non-.com ideas; stick to .com exact domains plus true full-word hacks from search. For hacks, the joined reading must be a single ordinary word, not a phrase or fragment: truck.in -> truckin is acceptable, while tune.me, leveled.in, driftless.in, trucks.in, steady.st, or equilia.in should be rejected. If confirmed-available full-word hacks are scarce, say so and return fewer results rather than padding with short suffix domains or coined non-.com alternatives. Search is bounded by default, so if it stops early, explain search_truncated and remaining_candidates."

policy:
  allow_implicit_invocation: true
